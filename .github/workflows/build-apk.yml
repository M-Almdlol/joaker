name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java (required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Flet
        run: pip install flet==0.28.3

      - name: Build APK
        run: flet build apk --no-rich-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: joaker-apk
          path: build/apk/app-release.apk
